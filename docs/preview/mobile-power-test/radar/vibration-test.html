<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vibration API Test</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f8fb;
      --card: #ffffff;
      --text: #1d2a33;
      --sub: #5d6d79;
      --ok: #0f9d58;
      --warn: #d93025;
      --line: #d6e2eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef8ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100dvh;
      padding: max(16px, env(safe-area-inset-top)) 16px 20px;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 10px rgba(23, 64, 91, 0.08);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
    }

    p {
      margin: 0;
      color: var(--sub);
      line-height: 1.5;
    }

    .state {
      font-size: 16px;
      font-weight: 700;
    }

    .state.ok {
      color: var(--ok);
    }

    .state.warn {
      color: var(--warn);
    }

    .kv {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 8px;
      font-size: 13px;
      margin-top: 10px;
    }

    .log {
      margin-top: 10px;
      font-family: ui-monospace, "Cascadia Code", "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      background: #f7fafc;
      border: 1px solid #e5edf3;
      border-radius: 8px;
      padding: 10px;
      max-height: 45dvh;
      overflow: auto;
    }

    .btn-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .test-btn {
      border: 1px solid #5db2d1;
      border-radius: 10px;
      background: linear-gradient(135deg, #d8f7ff 0%, #b7ecff 100%);
      color: #0f3b52;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 14px;
      cursor: pointer;
    }

    .test-btn:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Android 振動可否テスト</h1>
      <p>このページは読み込み後に自動で振動APIを2回実行します。ユーザー操作に同期していない状態で、端末やブラウザ設定により振動が許可されるかを確認します。</p>
    </section>

    <section class="card">
      <div id="state" class="state warn">実行待機中...</div>
      <div class="kv">
        <div>isSecureContext</div><div id="secure"></div>
        <div>navigator.vibrate</div><div id="hasVibrate"></div>
        <div>userAgent</div><div id="ua"></div>
        <div>visibilityState</div><div id="visibility"></div>
      </div>
      <div class="btn-row">
        <button id="syncVibrateBtn" class="test-btn" type="button">同期テスト（標準）</button>
        <button id="syncVibrateLongBtn" class="test-btn" type="button">同期テスト（1秒単発）</button>
        <button id="syncVibrateStrongBtn" class="test-btn" type="button">同期テスト（強め連続）</button>
      </div>
      <div id="log" class="log"></div>
    </section>
  </main>

  <script>
    (function () {
      const stateEl = document.getElementById('state');
      const logEl = document.getElementById('log');
      const secureEl = document.getElementById('secure');
      const hasVibrateEl = document.getElementById('hasVibrate');
      const uaEl = document.getElementById('ua');
      const visibilityEl = document.getElementById('visibility');
      const syncVibrateBtn = document.getElementById('syncVibrateBtn');
      const syncVibrateLongBtn = document.getElementById('syncVibrateLongBtn');
      const syncVibrateStrongBtn = document.getElementById('syncVibrateStrongBtn');

      function nowText() {
        return new Date().toLocaleTimeString();
      }

      function log(msg) {
        logEl.textContent += '[' + nowText() + '] ' + msg + '\n';
      }

      function setState(text, ok) {
        stateEl.textContent = text;
        stateEl.classList.toggle('ok', !!ok);
        stateEl.classList.toggle('warn', !ok);
      }

      function tryVibrate(pattern, label) {
        if (typeof navigator.vibrate !== 'function') {
          log(label + ': navigator.vibrate is not available');
          return false;
        }

        let accepted = false;
        try {
          accepted = navigator.vibrate(pattern) === true;
          log(label + ': pattern=' + JSON.stringify(pattern) + ' accepted=' + accepted);
        } catch (e) {
          log(label + ': exception=' + String(e));
        }
        return accepted;
      }

      function runAutoTest() {
        const first = tryVibrate([140, 80, 140], 'attempt-1');

        setTimeout(function () {
          const second = tryVibrate(220, 'attempt-2');
          const result = first || second;
          if (result) {
            setState('振動リクエストは受理されました (accepted=true)', true);
          } else {
            setState('振動リクエストが受理されませんでした', false);
          }
        }, 2500);
      }

      secureEl.textContent = String(window.isSecureContext);
      hasVibrateEl.textContent = String(typeof navigator.vibrate === 'function');
      uaEl.textContent = navigator.userAgent || '(empty)';
      visibilityEl.textContent = document.visibilityState;

      document.addEventListener('visibilitychange', function () {
        visibilityEl.textContent = document.visibilityState;
        log('visibilitychange: ' + document.visibilityState);
      });

      if (syncVibrateBtn) {
        syncVibrateBtn.addEventListener('click', function () {
          log('sync-button tapped: standard');
          const accepted = tryVibrate([180, 90, 180], 'sync-attempt-standard');
          if (accepted) {
            setState('同期テストは受理されました (accepted=true)', true);
          } else {
            setState('同期テストも受理されませんでした', false);
          }
        });
      }

      if (syncVibrateLongBtn) {
        syncVibrateLongBtn.addEventListener('click', function () {
          log('sync-button tapped: 1s');
          const accepted = tryVibrate(1000, 'sync-attempt-1s');
          if (accepted) {
            setState('1秒単発テストは受理されました (accepted=true)', true);
          } else {
            setState('1秒単発テストも受理されませんでした', false);
          }
        });
      }

      if (syncVibrateStrongBtn) {
        syncVibrateStrongBtn.addEventListener('click', function () {
          log('sync-button tapped: strong');
          const accepted = tryVibrate([350, 120, 350, 120, 350], 'sync-attempt-strong');
          if (accepted) {
            setState('強め連続テストは受理されました (accepted=true)', true);
          } else {
            setState('強め連続テストも受理されませんでした', false);
          }
        });
      }

      log('page loaded');
      log('start auto vibration test in 600ms');
      setTimeout(runAutoTest, 600);
    })();
  </script>
</body>
</html>
